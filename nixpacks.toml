[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "PIP_BIN=$(command -v pip3 || command -v pip); $PIP_BIN install --upgrade pip",
  "PIP_BIN=$(command -v pip3 || command -v pip); $PIP_BIN install -r backend/requirements.txt",
  "npm --prefix client ci"
]

[phases.build]
cmds = [
  "npm --prefix client run build"
]

[start]
cmd = "gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
