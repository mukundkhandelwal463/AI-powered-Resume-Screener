# ==============================================================
# AI Resume Screener — GitHub Actions CI/CD Pipeline
# ==============================================================
# Triggers on push/PR to main and dev branches.
# Jobs run in this order:
#   [backend-test] + [frontend-build]  ← parallel
#           ↓ (both must pass)
#       [docker-build]
#           ↓ (only on main branch)
#          [deploy]
# ==============================================================

name: AI Resume Screener CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/resume-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/resume-frontend

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1: Run Backend Tests
  # ════════════════════════════════════════════════════════════
  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run API tests
        run: |
          python -m pytest backend/tests/ -v --tb=short
        env:
          FLASK_ENV: testing
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SECRET_KEY: test-secret-key

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
        if: always()

  # ════════════════════════════════════════════════════════════
  # JOB 2: Build React Frontend
  # ════════════════════════════════════════════════════════════
  frontend-build:
    name: ⚛️ Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies (clean install)
        run: |
          cd client
          npm ci

      - name: Build production bundle
        run: |
          cd client
          npm run build
        # Vite output → client/dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

  # ════════════════════════════════════════════════════════════
  # JOB 3: Build + Push Docker Images
  # Only runs after BOTH backend-test AND frontend-build pass
  # ════════════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]   # ← wait for both

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push backend image
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push frontend image
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════
  # JOB 4: Deploy to AWS EC2
  # ONLY runs when pushed to `main` branch (not dev or PRs)
  # ════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app/Resume_Screener
            git pull origin main
            # Pull latest images
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest
            # Restart all services with zero downtime
            docker-compose up -d --no-build
            # Clean up old images
            docker image prune -f
            echo "✅ Deployment complete!"
            docker-compose ps
