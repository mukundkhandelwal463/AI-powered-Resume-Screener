<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results - AI Resume Platform</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="navbar">
    <a class="logo" href="home.html">AIResume</a>
    <nav class="nav-links">
        <a href="home.html">Home</a>
        <a href="upload.html">Analyze</a>
        <a href="chatbot.html">Resume Builder</a>
        <a class="active" href="result.html">Results</a>
    </nav>
</header>

<main class="page" id="resultPage">
    <h1>Resume Analysis Result</h1>

    <div id="resultEmpty" class="status info" style="display:none;">
        No analysis result found. Go to Analyze page and submit a resume.
    </div>

    <section class="card" style="margin-bottom:18px;">
        <h2>Summary</h2>
        <div class="result-grid">
            <div class="metric">
                <div class="label">ATS Score</div>
                <div id="atsScore" class="value">--</div>
            </div>
            <div class="metric">
                <div class="label">Category</div>
                <div id="category" class="value">--</div>
            </div>
            <div class="metric">
                <div class="label">Detected Skills</div>
                <div id="skills" class="value" style="font-size:14px;font-weight:600;">--</div>
            </div>
        </div>
    </section>

    <section class="grid two">
        <article class="card">
            <h2>Missing Keywords</h2>
            <ul id="missingKeywords" class="list"></ul>
        </article>
        <article class="card">
            <h2>Suggestions</h2>
            <ul id="suggestions" class="list"></ul>
        </article>
    </section>

    <section class="card" style="margin-top:20px;">
        <h2>Job Recommendations</h2>
        <div id="jobs" class="grid two"></div>
    </section>
</main>

<script src="../js/app.js"></script>
</body>
</html>
