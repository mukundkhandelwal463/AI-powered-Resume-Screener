<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Score - AI Resume Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="navbar">
    <a class="brand" href="home.html">
        <span class="brand-mark">AR</span>
        <div>
            <strong>AIResume</strong>
            <span>Intelligent Career Pipeline</span>
        </div>
    </a>
    <nav class="nav-links">
        <a href="home.html">Home</a>
        <a class="active" href="upload.html">ATS Score</a>
        <a href="maker_options.html">Resume Maker</a>
        <a href="jobs.html">Live Jobs</a>
    </nav>
</header>

<main class="page">
    <h1 style="text-align:center;font-size:clamp(2.2rem,5vw,3.2rem);margin-bottom:36px;">ATS Resume Analyzer</h1>

    <article class="card" style="max-width:700px;margin:0 auto;">
        <form id="analyzeForm">

            <div class="drop-zone" id="dropZone">
                <div class="icon">📄</div>
                <div class="label">Drag & drop your resume here, or <strong>click to browse</strong></div>
                <div class="file-name" id="fileName"></div>
                <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" style="display:none;">
            </div>

            <label for="streamCategory">Category / Stream (optional)</label>
            <input id="streamCategory" type="text" placeholder="Example: Data Science, DevOps, HR, Marketing">

            <label for="jobDescription">Target Job Description (optional but recommended)</label>
            <textarea id="jobDescription" placeholder="Paste the full job description here for a precise ATS match score..." style="min-height:140px;"></textarea>

            <button class="btn-primary" type="submit" style="width:100%;font-size:16px;padding:14px;">
                Analyze Match & Get AI Career Map
            </button>
        </form>
        <div id="status" class="status"></div>
    </article>
</main>

<footer class="footer">
    <p>&copy; 2026 AI Resume Platform</p>
    <div>
        <a href="upload.html">ATS Benchmark</a>
        <a href="maker_options.html">Resume Maker Hub</a>
        <a href="jobs.html">Market Pipeline</a>
    </div>
</footer>

<script src="../js/app.js"></script>
<script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("resumeFile");
    const fileNameEl = document.getElementById("fileName");

    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });
    dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
    });
    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            showFileName(e.dataTransfer.files[0].name);
        }
    });
    fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) showFileName(fileInput.files[0].name);
    });

    function showFileName(name) {
        fileNameEl.textContent = "✅ " + name;
        fileNameEl.style.display = "block";
    }
</script>
</body>
</html>
