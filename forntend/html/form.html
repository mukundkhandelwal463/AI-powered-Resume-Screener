<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Builder - AIResume</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="navbar">
    <a class="logo" href="home.html">AIResume</a>
    <nav class="nav-links">
        <a href="home.html">Home</a>
        <a href="upload.html">ATS Score</a>
        <a class="active" href="maker_options.html">Resume Maker</a>
        <a href="jobs.html">Live Jobs</a>
    </nav>
</header>
<main class="page" id="formPage">
    <h1>Web Form Builder</h1>
    <section class="grid two">
        <article class="card">
            <h2>Your Details</h2>
            <form id="buildForm">
                <input type="text" id="fName" placeholder="Full Name" required>
                <input type="email" id="fEmail" placeholder="Email Address" required>
                <input type="text" id="fPhone" placeholder="Phone Number" required>
                <input type="text" id="fLocation" placeholder="Location/LinkedIn" required>
                <textarea id="fSummary" placeholder="Professional Summary"></textarea>
                <textarea id="fSkills" placeholder="Top Skills (comma separated)"></textarea>
                <textarea id="fExp" placeholder="Experience (Bullet points)"></textarea>
                <textarea id="fEdu" placeholder="Education Details"></textarea>
                
                <label>Template Choice</label>
                <select id="fTemplate" style="width:100%;padding:10px;margin-bottom:15px;border-radius:8px;">
                    <option value="Classic ATS">Classic ATS</option>
                    <option value="Modern Minimalist">Modern Minimalist</option>
                    <option value="Executive">Executive</option>
                </select>
                
                <button type="submit" class="btn-primary" style="width:100%;">Build Resume & Get Gemini Feedback</button>
            </form>
            <div id="fStatus" class="status"></div>
        </article>
        <article class="card">
            <h2>Generated Output</h2>
            <div id="fGemini" style="white-space:pre-wrap;background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;padding:12px;margin-bottom:15px;display:none;"></div>
            <div id="fDownloads" style="display:flex;gap:10px;margin-bottom:15px;"></div>
            <pre id="fPreview" style="white-space:pre-wrap;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px;min-height:300px;">Preview will appear here</pre>
            
            <button class="btn-primary" onclick="window.location.href='jobs.html'" style="margin-top:20px;background:#0f9d58;display:none;" id="toJobsBtnForm">Proceed to Live Jobs!</button>
        </article>
    </section>
</main>
<script src="../js/app.js"></script>
</body>
</html>
