<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blank Templates - AIResume</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="navbar">
    <a class="logo" href="home.html">AIResume</a>
    <nav class="nav-links">
        <a href="home.html">Home</a>
        <a href="upload.html">ATS Score</a>
        <a class="active" href="maker_options.html">Resume Maker</a>
        <a href="jobs.html">Live Jobs</a>
    </nav>
</header>
<main class="page" id="blanksPage" style="text-align: center;">
    <h1>Download Blank ATS Templates</h1>
    <p>Download our perfectly structured, empty formats in Word/PDF to edit independently entirely on your own without uploading data.</p>
    
    <div style="margin-top:30px;">
        <h3>Select Template</h3>
        <select id="blankTemplate" style="padding:10px;font-size:16px;border-radius:8px;min-width:250px;">
            <option value="Classic ATS">Classic ATS</option>
            <option value="Modern Minimalist">Modern Minimalist</option>
            <option value="Executive">Executive</option>
        </select>
        <br><br>
        <button id="downloadBlanksBtn" class="btn-primary" style="font-size:18px;">Fetch Selected Blanks</button>
        <div id="blankStatus" class="status" style="width:50%;margin:20px auto;"></div>
        <div id="blankDownloads" style="margin-top:20px;display:flex;gap:15px;justify-content:center;"></div>
    </div>
</main>
<script src="../js/app.js"></script>
</body>
</html>
